<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>พระเครื่อง 77 จังหวัด | คลังข้อมูลมรดกไทย</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Kanit', sans-serif;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s, backdrop-filter 0.2s;
    }

    /* ===== GLOBAL BACKGROUND WITH OVERLAY (มุมสูงอยุธยา) ===== */
    body {
      background-color: #0a1f0e;
      position: relative;
      color: #f0fff0;
      padding: 1.5rem;
      min-height: 100vh;
    }

    /* ภาพมุมสูง เมืองมรดกโลกอยุธยา */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://upload.wikimedia.org/wikipedia/commons/c/ce/Ayutthaya_3_pagodas.jpg') center center / cover no-repeat fixed;
      z-index: -2;
    }

    /* Overlay โปร่งแสง */
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: -1;
    }

    /* LIGHT MODE */
    body.light::after {
      background: rgba(255, 245, 225, 0.85);
    }
    body.light {
      color: #1a3a2a;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    /* toolbar glass */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      background: rgba(0, 20, 0, 0.45);
      backdrop-filter: blur(12px);
      padding: 12px 24px;
      border-radius: 60px;
      border: 1px solid rgba(210, 180, 110, 0.6);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }
    body.light .toolbar {
      background: rgba(255, 248, 225, 0.85);
      border-color: #c9aa6f;
    }

    h1 {
      font-size: 1.8rem;
      background: linear-gradient(135deg, #f9f2b0, #a3f0c0);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 600;
    }
    body.light h1 {
      background: linear-gradient(135deg, #2c5e2a, #1f6e4a);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .search-area {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .search-box {
      padding: 10px 20px;
      border-radius: 48px;
      border: none;
      background: rgba(30, 42, 34, 0.85);
      backdrop-filter: blur(8px);
      color: #e0ffe8;
      font-size: 1rem;
      width: 260px;
      outline: none;
      box-shadow: 0 0 0 1px #c5a15b;
    }
    body.light .search-box {
      background: rgba(255, 249, 239, 0.9);
      color: #1e3a2a;
    }
    .search-box:focus {
      box-shadow: 0 0 0 2px #f5c542;
    }
    button {
      background: rgba(43, 79, 56, 0.85);
      backdrop-filter: blur(8px);
      border: none;
      padding: 8px 22px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      color: #fcf9e1;
      transition: 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    body.light button {
      background: rgba(238, 223, 168, 0.95);
      color: #2c5836;
    }
    button:hover {
      transform: scale(0.97);
      background: #4f8b60;
      color: white;
    }
    .voice-btn {
      background: rgba(60, 110, 80, 0.85);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .stats {
      margin: 15px 5px 20px 5px;
      font-weight: 500;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
      display: inline-block;
      padding: 6px 20px;
      border-radius: 60px;
      font-size: 0.9rem;
      border: 1px solid rgba(210, 180, 110, 0.5);
    }
    body.light .stats {
      background: rgba(242, 229, 207, 0.85);
      color: #2a5a3a;
    }

    /* ====== GALLERY - การ์ดโปร่งใส กระจกสีขาวขุ่น สวยงาม ====== */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 1.8rem;
      margin: 2rem 0 2.5rem;
    }

    /* การ์ดแบบ Glassmorphism สีขาวใส มีความลึก */
    .card {
      background: rgba(255, 255, 245, 0.2);
      backdrop-filter: blur(16px);
      border-radius: 36px;
      padding: 1.2rem 1rem 1rem 1rem;
      border: 1px solid rgba(255, 235, 190, 0.7);
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 0 18px 32px rgba(0, 0, 0, 0.25);
      display: flex;
      flex-direction: column;
    }

    /* เมื่อ light mode การ์ดจะขาวใสแต่มีมิติ */
    body.light .card {
      background: rgba(255, 253, 245, 0.65);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(200, 170, 100, 0.7);
      box-shadow: 0 12px 28px rgba(80, 50, 20, 0.15);
      color: #1e3a2a;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 0 28px rgba(212, 175, 55, 0.8);
      border-color: #f3d382;
      background: rgba(255, 255, 250, 0.35);
      backdrop-filter: blur(20px);
    }

    body.light .card:hover {
      background: rgba(255, 252, 235, 0.85);
      box-shadow: 0 18px 32px rgba(0, 0, 0, 0.12);
    }

    .card-name {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 10px;
      line-height: 1.4;
      word-break: break-word;
      color: #ffffe0;
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }
    body.light .card-name {
      color: #1f5430;
      text-shadow: none;
    }

    .badge {
      display: inline-block;
      background: rgba(31, 77, 44, 0.85);
      backdrop-filter: blur(4px);
      padding: 4px 14px;
      border-radius: 50px;
      font-size: 0.7rem;
      font-weight: 600;
      margin-bottom: 12px;
      align-self: flex-start;
    }
    body.light .badge {
      background: #e0c894cc;
      color: #2b482c;
    }

    .keywords {
      font-size: 0.75rem;
      opacity: 0.95;
      margin: 10px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .keyword-tag {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      padding: 2px 12px;
      border-radius: 30px;
    }
    body.light .keyword-tag {
      background: rgba(210, 180, 120, 0.6);
      color: #2e593a;
    }

    .card-link {
      margin-top: 12px;
      text-align: center;
      background: rgba(47, 84, 60, 0.8);
      backdrop-filter: blur(4px);
      border-radius: 40px;
      padding: 8px;
      font-weight: 600;
      transition: 0.2s;
    }
    body.light .card-link {
      background: rgba(238, 223, 168, 0.9);
    }
    .card-link a {
      color: #faf9cd;
      text-decoration: none;
      display: block;
      font-size: 0.9rem;
    }
    body.light .card-link a {
      color: #2a623a;
    }
    .card-link:hover {
      background: #478a5c;
    }
    .no-link {
      color: #efebd0;
      font-style: italic;
      font-size: 0.8rem;
    }
    body.light .no-link {
      color: #8b7652;
    }

    .footer {
      text-align: center;
      margin: 40px 0 20px;
      font-size: 0.8rem;
      border-top: 1px dashed rgba(210, 180, 110, 0.6);
      padding-top: 20px;
      background: transparent;
      backdrop-filter: blur(4px);
    }

    @media (max-width: 680px) {
      body { padding: 1rem; }
      .toolbar { flex-direction: column; align-items: stretch; border-radius: 32px; }
      .search-area { justify-content: center; }
      .search-box { width: 100%; }
    }
  </style>
</head>

  function getCategoryThai(cat) {
    const map = {
      forest: "🌲 สายกรรมฐาน",
      ancient: "🏺 พระกรุ / โบราณคดี",
      monk: "🧘 พระเกจิอาจารย์",
      region: "🏙 พระเครื่องประจำจังหวัด",
      special: "🔥 มรดกพุทธศิลป์"
    };
    return map[cat] || "📿 อื่นๆ";
  }

  let currentFiltered = [...amulets];

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function renderCards(items) {
    const gallery = document.getElementById('galleryContainer');
    if (!gallery) return;
    if (items.length === 0) {
      gallery.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem; background: rgba(0,0,0,0.4); backdrop-filter: blur(12px); border-radius: 48px;">❌ ไม่พบพระเครื่องที่ค้นหา ลองใช้คำอื่น หรือค้นหาด้วยเสียงอีกครั้ง</div>`;
      document.getElementById('statsDisplay').innerHTML = `🔍 ไม่พบรายการ (0 รายการ)`;
      return;
    }
    let html = '';
    for (let am of items) {
      const catThai = getCategoryThai(am.category);
      const kw = am.keywords || [];
      const kwHtml = kw.length ? `<div class="keywords">${kw.map(k => `<span class="keyword-tag">#${escapeHtml(k)}</span>`).join('')}</div>` : '';
      const linkHtml = am.url && am.url.trim() !== "" 
        ? `<div class="card-link"><a href="${am.url}" target="_blank" rel="noopener noreferrer">🔗 ดูรายละเอียด / ชมภาพ</a></div>`
        : `<div class="card-link no-link" style="background: rgba(58, 74, 56, 0.7);"><span>📭 กำลังเพิ่มข้อมูลลิงก์</span></div>`;
      
      html += `
        <div class="card">
          <div class="badge">${catThai}</div>
          <div class="card-name">${escapeHtml(am.name)}</div>
          ${kwHtml}
          ${linkHtml}
        </div>
      `;
    }
    gallery.innerHTML = html;
    document.getElementById('statsDisplay').innerHTML = `✨ พบพระเครื่องทั้งสิ้น ${items.length} รายการ (คลังข้อมูล ${amulets.length} รายการ) | ภาพพื้นหลัง : มรดกโลกอยุธยา`;
  }

  function performSearch() {
    const query = document.getElementById('searchInput').value.trim().toLowerCase();
    if (query === "") {
      currentFiltered = [...amulets];
      renderCards(currentFiltered);
      return;
    }
    const filtered = amulets.filter(item => {
      const nameMatch = item.name.toLowerCase().includes(query);
      const kwMatch = item.keywords.some(k => k.toLowerCase().includes(query));
      const catMatch = getCategoryThai(item.category).toLowerCase().includes(query);
      return nameMatch || kwMatch || catMatch;
    });
    currentFiltered = filtered;
    renderCards(currentFiltered);
  }

  let recognition = null;
  function startVoiceSearch() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      alert("เบราว์เซอร์ของคุณไม่รองรับการค้นหาด้วยเสียง (แนะนำ Chrome, Edge, Safari)");
      return;
    }
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = 'th-TH';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
    
    recognition.onstart = () => {
      const btn = document.querySelector('.voice-btn');
      btn.textContent = "🎙️ กำลังฟังเสียง...";
      btn.style.background = "#6a9c70";
    };
    recognition.onerror = (event) => {
      console.error(event.error);
      alert("ไม่สามารถรับเสียงได้: " + event.error);
      resetVoiceBtn();
    };
    recognition.onend = () => resetVoiceBtn();
    recognition.onresult = (event) => {
      const spoken = event.results[0][0].transcript;
      document.getElementById('searchInput').value = spoken;
      performSearch();
      resetVoiceBtn();
    };
    recognition.start();
  }
  
  function resetVoiceBtn() {
    const btn = document.querySelector('.voice-btn');
    if(btn) {
      btn.textContent = "🎤 ค้นหาด้วยเสียง";
      btn.style.background = "";
    }
  }

  function toggleTheme() {
    document.body.classList.toggle('light');
    const isLight = document.body.classList.contains('light');
    localStorage.setItem('amuletsTheme', isLight ? 'light' : 'dark');
  }
  
  function loadTheme() {
    const saved = localStorage.getItem('amuletsTheme');
    if (saved === 'light') document.body.classList.add('light');
    else document.body.classList.remove('light');
  }

  window.onload = () => {
    loadTheme();
    renderCards(amulets);
    const searchBox = document.getElementById('searchInput');
    searchBox.addEventListener('keyup', (e) => {
      if (e.key === 'Enter') performSearch();
    });
  };
</script>
